<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion CyberAtlas</title>
    <style>
        body { background:#1a1a1a; color:white; font-family:sans-serif; text-align:center; padding-top:100px; }
        input { padding: 10px; margin: 5px; border-radius: 5px; border: none; width: 250px; }
        button { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        a { color: #a0a0a0; text-decoration: none; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <h2>Connexion CyberAtlas</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p style="color: #e74c3c;">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="text" name="username" placeholder="Nom d'utilisateur" required><br>
        <input type="password" name="password" placeholder="Mot de passe" required><br><br>
        <button type="submit">Se connecter</button>
    </form>
    <a href="{{ url_for('auth.register') }}">Je n'ai pas de compte. Créer un compte.</a>
</body>
</html>
